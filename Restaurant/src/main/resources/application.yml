# src/main/resources/application.yml
# ============================================
# 餐厅管理系统 - Spring Boot 配置文件
# 最后更新: 2026-03-05
# ============================================

spring:
  application:
    name: restaurant-system
#1.2 . 外部化配置管理 (application.yml)
  #技術說明：使用 YAML 格式配置文件管理數據庫連接、MyBatis 設置、日誌級別及自定義數據庫初始化參數，支持環境變量覆蓋。
  #通過 ${VAR:default} 語法實現了開發環境與生產環境的隔離。hikari 連接池配置確保了數據庫連接的高效管理。db.init 自定義配置專用於數據庫初始化邏輯。
  datasource:
#    url: jdbc:mysql://localhost:3306/restaurant_sys_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8&allowPublicKeyRetrieval=true
    url: jdbc:mysql://localhost:3306/restaurant_sys_db?useSSL=false&serverTimezone=UTC&characterEncoding=utf-8&allowPublicKeyRetrieval=true&allowMultiQueries=true
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: RestaurantHikariCP

#1.6  MyBatis 集成與 XML 映射
#技術說明：通過 application.yml 配置 Mapper XML 路徑，使用 XML 文件編寫複雜 SQL，實現 ORM 映射。
#type-aliases-package 允許在 XML 中直接使用 BusinessStatusMapper 而不是全限定名。XML 分離了 SQL 與 Java 代碼，便於維護複雜查詢（如報表統計）。
mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.restaurant.entity
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
    lazy-loading-enabled: false
    # 注释掉 log-impl 以隐藏 SQL 输出
    # log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# ===== 新增：数据库初始化专用配置 =====
# 2.4 外部化數據庫配置 (Externalized Configuration)
#技術說明：通過 application.yml 和 @Value 註解注入數據庫連接信息，支持環境變量覆蓋，實現開發、測試、生產環境的配置隔離。
#：這種設計避免了硬編碼敏感信息（如密碼）。生產環境可通過 -DDA_PASSWORD=xxx 或環境變量注入，符合十二因子應用原則（12-Factor App）。
db:
  init:
    host: ${DB_HOST:localhost}
    port: ${DB_PORT:3306}
    name: ${DB_NAME:restaurant_sys_db}
    # ⚠️ 生产环境请通过环境变量传入密码，不要写死在 yml 中
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:1234}

#1.8  日誌系統配置與分級控制
#技術說明：使用 Spring Boot 內置的 Logback，通過 application.yml 控制不同包的路徑級別，平衡調試信息與性能。
#將 mapper 包設置為 WARN 可以避免在生產環境輸出大量 SQL 語句，影響性能。自定義 pattern 確保日誌包含時間戳和線程名，便於排查併發問題。
logging:
  level:
    root: INFO
    com.restaurant: INFO
    com.restaurant.mapper: WARN
    com.restaurant.service: INFO
    com.restaurant.controller: INFO
    org.apache.ibatis: WARN
    org.mybatis.spring: WARN
    org.springframework: WARN
    org.springframework.jdbc: WARN
    com.zaxxer.hikari: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/restaurant.log
    max-size: 10MB
    max-history: 30

server:
  port: 8080